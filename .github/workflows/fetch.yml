name: fetch-and-translate

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fetch
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch & translate
        env:
          RSS_URL: ${{ vars.RSS_URL }}
        run: python fetch.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain docs/posts.json)" ]; then
            git add docs/posts.json
            git commit -m "update posts"
            git push
          else
            echo "no change"
          fi
