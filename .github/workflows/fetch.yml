name: fetch-and-translate

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fetch
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch & translate Truth Social
        env:
          RSS_URL: ${{ vars.RSS_URL }}
        run: python fetch.py

      - name: Fetch & translate Yahoo Finance
        run: python fetch_finance.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/posts.json docs/finance.json
          if [ -n "$(git diff --cached)" ]; then
            git commit -m "update posts and finance news"
            git push
          else
            echo "no change"
          fi
