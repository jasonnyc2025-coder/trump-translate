name: fetch-movers

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fetch-movers
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch market movers (US + A-shares)
        run: python fetch_movers.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/movers.json
          if [ -n "$(git diff --cached)" ]; then
            git commit -m "update movers"
            git push
          else
            echo "no change"
          fi
