<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="帖子翻译">
<meta name="theme-color" content="#b3392f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>帖子翻译</title>
<style>
  :root{
    --ink:#1a1a1a; --paper:#f5f2ec; --line:#d8d2c6;
    --accent:#b3392f; --muted:#7a756b; --card:#fffdf8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--paper); color:var(--ink);
    font-family:"Noto Serif SC",Georgia,"Songti SC",serif;
    line-height:1.65; padding:env(safe-area-inset-top) 0 2rem;
  }
  header{
    position:sticky; top:0; z-index:10;
    background:var(--paper); border-bottom:2px solid var(--ink);
    padding:1rem 1.1rem .8rem; display:flex; align-items:baseline; gap:.6rem;
  }
  header h1{
    font-size:1.15rem; font-weight:700; letter-spacing:.02em;
    font-family:Georgia,"Songti SC",serif;
  }
  header .meta{font-size:.72rem; color:var(--muted); margin-left:auto}
  main{max-width:680px; margin:0 auto; padding:1rem .9rem}
  .post{
    background:var(--card); border:1px solid var(--line);
    border-left:3px solid var(--accent);
    border-radius:2px; padding:.95rem 1.05rem; margin-bottom:.9rem;
  }
  .zh{font-size:1.06rem; white-space:pre-wrap; word-break:break-word}
  .zh.untranslated{color:var(--muted); font-style:italic}
  details{margin-top:.6rem}
  summary{
    font-size:.74rem; color:var(--accent); cursor:pointer;
    list-style:none; user-select:none; font-family:Georgia,sans-serif;
  }
  summary::-webkit-details-marker{display:none}
  summary::before{content:"原文 ▸ "}
  details[open] summary::before{content:"原文 ▾ "}
  .en{
    margin-top:.5rem; padding-top:.5rem; border-top:1px dashed var(--line);
    font-size:.92rem; color:#3a3a3a; white-space:pre-wrap; word-break:break-word;
    font-family:Georgia,serif;
  }
  .stamp{
    margin-top:.55rem; font-size:.68rem; color:var(--muted);
    font-family:Georgia,sans-serif; display:flex; gap:.7rem; align-items:center;
  }
  .stamp a{color:var(--muted)}
  .empty,.error{text-align:center; color:var(--muted); padding:3rem 1rem; font-size:.95rem}
  .error{color:var(--accent)}
  @media (prefers-color-scheme:dark){
    :root{--ink:#ece7dd;--paper:#1b1a17;--line:#3a382f;--accent:#e0796d;--muted:#9a958a;--card:#232118}
    header{border-bottom-color:var(--ink)}
  }
</style>
</head>
<body>
<header>
  <h1>帖子翻译</h1>
  <span class="meta" id="meta">加载中…</span>
</header>
<main id="feed"><div class="empty">加载中…</div></main>

<script>
const feed = document.getElementById("feed");
const meta = document.getElementById("meta");

function esc(s){const d=document.createElement("div");d.textContent=s||"";return d.innerHTML;}
function fmt(iso){
  if(!iso) return "";
  const d = new Date(iso);
  if(isNaN(d)) return iso;
  return d.toLocaleString("zh-CN",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});
}

async function load(){
  try{
    const res = await fetch("posts.json?t=" + Date.now());
    if(!res.ok) throw new Error(res.status);
    const posts = await res.json();
    if(!posts.length){ feed.innerHTML = '<div class="empty">还没有帖子。程序抓到新帖后会出现在这里。</div>'; meta.textContent=""; return; }
    meta.textContent = posts.length + " 条";
    feed.innerHTML = posts.map(p => `
      <article class="post">
        <div class="zh ${p.zh ? "" : "untranslated"}">${esc(p.zh || p.text)}</div>
        ${p.zh ? `<details><summary>原文</summary><div class="en">${esc(p.text)}</div></details>` : ""}
        <div class="stamp">
          <span>${esc(fmt(p.date || p.fetched_at))}</span>
          ${p.link ? `<a href="${esc(p.link)}" target="_blank" rel="noopener">来源 ↗</a>` : ""}
        </div>
      </article>`).join("");
  }catch(e){
    feed.innerHTML = '<div class="error">加载失败：还没有 posts.json，或网络问题。等第一次定时任务跑完再刷新。</div>';
    meta.textContent = "";
  }
}
load();
setInterval(load, 60000); // 每分钟刷新一次

// 注册 service worker（PWA 离线 + 主屏 App）
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
</script>
</body>
</html>
